name: mobile
description: Founder Project Notebook mobile application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.6.0
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  path: ^1.9.0
  shared_preferences: ^2.5.4
  receive_sharing_intent: ^1.8.1
  shimmer: ^3.0.0
  share_plus: ^12.0.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  app_links: ^6.4.0          # App Links (Android) + Universal Links (iOS)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true